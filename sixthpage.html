<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Service Status</title>

<style>
*{
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  padding:40px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;

  background:
  radial-gradient(circle at top left, #6dd5fa, transparent 40%),
  radial-gradient(circle at bottom right, #2980b9, transparent 40%),
  #1e3c72;
}

.card{
  background:#fff;
  width:360px;
  padding:30px 25px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  text-align:center;
}

.icon{
  font-size:42px;
  margin-bottom:10px;
}

h2{
  margin-bottom:10px;
  color:#1e3c72;
}

p{
  font-size:14px;
  color:#555;
  margin-bottom:20px;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:30px;
  font-size:15px;
  cursor:pointer;
}

.done-btn{
  background:#28a745;
  color:white;
}

.pending-btn{
  background:#ffc107;
  color:#333;
}

.thank-box{
  display:none;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.95);}
  to{opacity:1; transform:scale(1);}
}

.lbtn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:#fff;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<div id="jobSection">
<div class="icon">🛠️</div>
<h2>Service Status</h2>
<p>Is your cable problem fixed?</p>

<button class="btn done-btn" onclick="markDone()">✅ Job Done</button>
<button class="btn pending-btn" onclick="markPending()">⏳ Not Yet</button>
</div>

<div class="thank-box" id="thankBox">
<div class="icon">🎉</div>
<h2>Service Completed!</h2>
<p>Thank you for using our app 📺</p>

<button class="lbtn" onclick="goHome()">Back to Home</button>
</div>

</div>

<!-- JOB TABLE -->
<div style="margin-top:40px; width:80%; max-width:900px; background:white; padding:20px; border-radius:10px;">

<h3>Job History</h3>

<table style="width:100%; border-collapse:collapse;">
<tr style="background:#1e3c72; color:white;">
<th>Job ID</th>
<th>User Phone</th>
<th>Operator</th>
<th>Problem</th>
<th>Status</th>
<th>Time</th>
</tr>

<tbody id="jobsTable"></tbody>
</table>

</div>

<script>

// ✅ COMPLETE JOB
function markDone(){

  let jobId = localStorage.getItem("jobId");

  fetch("/update-job-status",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      job_id: parseInt(jobId),
      status: "Completed"
    })
  })
  .then(res => res.text())
  .then(() => {

    // show animation AFTER backend success
    document.getElementById("jobSection").style.display="none";
    document.getElementById("thankBox").style.display="block";

    loadJobs(); // refresh table
  })
  .catch(() => {
    // still show animation if error
    document.getElementById("jobSection").style.display="none";
    document.getElementById("thankBox").style.display="block";
  });

}

// ❌ NOT DONE
function markPending(){
  alert("Job still pending");
}

// 🔙 HOME
function goHome(){
  window.location.href="secondpage.html";
}

// 📊 LOAD JOBS
function loadJobs(){

fetch("/jobs")
.then(res=>res.json())
.then(data=>{

let table=document.getElementById("jobsTable");
table.innerHTML="";

data.forEach(job=>{
table.innerHTML+=`
<tr>
<td>${job.job_id}</td>
<td>${job.user_phone}</td>
<td>${job.operator}</td>
<td>${job.problem}</td>
<td>${job.status}</td>
<td>${job.time}</td>
</tr>
`;
});

});

}

loadJobs();

</script>

</body>
</html>
