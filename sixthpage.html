<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Service Status</title>

<style>
body{
margin:0;
min-height:100vh;
padding:40px;
display:flex;
flex-direction:column;
align-items:center;
background:#1e3c72;
color:white;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:10px;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
color:black;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}
</style>
</head>

<body>

<div class="card">

<h2>Service Status</h2>

<button onclick="markDone()">✅ Job Done</button>
<button onclick="markPending()">⏳ Not Yet</button>

</div>

<h2>Job History</h2>

<table>

<tr>
<th>Job ID</th>
<th>User Phone</th>
<th>Operator</th>
<th>Problem</th>
<th>Status</th>
<th>Time</th>
</tr>

<tbody id="jobsTable"></tbody>

</table>

<script>

function markDone(){

let jobId=localStorage.getItem("jobId");

// ✅ UPDATED API
fetch("https://cable-operator-app.onrender.com/update-job-status",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
job_id:parseInt(jobId),
status:"Completed"
})
});

alert("Job marked as completed");

loadJobs();
}

function markPending(){
alert("Job still pending");
}

// ✅ LOAD JOBS
function loadJobs(){

fetch("https://cable-operator-app.onrender.com/jobs")
.then(res=>res.json())
.then(data=>{

let table=document.getElementById("jobsTable");
table.innerHTML="";

data.forEach(job=>{
table.innerHTML+=`
<tr>
<td>${job.job_id}</td>
<td>${job.user_phone}</td>
<td>${job.operator}</td>
<td>${job.problem}</td>
<td>${job.status}</td>
<td>${job.time}</td>
</tr>
`;
});

});
}

loadJobs();

</script>

</body>
</html>
