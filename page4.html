<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Available Operators</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f1b24;
    color: white;
    padding: 20px;
  }

  .card {
    background: #1e2a35;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
  }

  .card.disabled {
    opacity: 0.5;
  }

  .next-btn {
    background: orange;
    color: white;
    padding: 10px 18px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>Available Operators</h1>

<form id="operatorsForm">

<!-- Operators will load here dynamically -->

<button type="button" class="next-btn" onclick="goNext()">Next</button>

</form>

<script>

// Load operators from backend
fetch("http://localhost:3000/operators")
.then(res => res.json())
.then(data => {

  const form = document.getElementById("operatorsForm");

  data.forEach(op => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <input type="radio" name="operator" value="${op.name}">
      <h3>${op.name}</h3>
      <p>Phone: ${op.phone}</p>
      <p>Distance: ${op.distance}</p>
      <p>Status: ${op.status}</p>
      <p>Jobs today: ${op.jobs_today}</p>
    `;

    // If operator is busy disable selection
    if(op.status === "Busy"){
      card.classList.add("disabled");
      card.querySelector("input").disabled = true;
    }

    form.insertBefore(card, form.lastElementChild);

  });

});


// Next button
function goNext(){

  let selected = document.querySelector('input[name="operator"]:checked');

  if(!selected){
    alert("Select an available operator");
    return;
  }

  localStorage.setItem("operatorName", selected.value);

  window.location.href = "page5.html";

}

</script>

</body>
</html>
